<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Syne',sans-serif;background:#ffffff;color:#111111;overscroll-behavior:none;}
#app{height:100vh;height:-webkit-fill-available;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,0px);}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;order:1;}

.screen.active{display:block;}
#tabbar{display:flex;background:#ffffff;border-top:2px solid #e0e0e0;padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;order:2;}

.tab svg{width:22px;height:22px;stroke-width:1.5;fill:none;stroke:currentColor;}
.tab.active{color:#2e7d32;}
.page-header{padding:1.4rem 1.2rem 1rem;border-bottom:2px solid #e8e8e8;position:sticky;top:0;z-index:10;background:#ffffff;}
.eyebrow{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:#2e7d32;margin-bottom:0.3rem;}
.page-header h1{font-size:1.6rem;font-weight:800;color:#111111;line-height:1.1;}
.page-header p{font-size:0.78rem;color:#666666;margin-top:0.3rem;}
.card{margin:0.85rem 1rem 0;background:#ffffff;border:2px solid #e0e0e0;border-radius:14px;padding:1.2rem;box-shadow:0 1px 6px rgba(0,0,0,0.07);}
.card-lbl{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:#2e7d32;margin-bottom:0.9rem;display:flex;align-items:center;gap:0.5rem;font-weight:500;}
.card-lbl::after{content:'';flex:1;height:1.5px;background:#e8e8e8;}
.toggle-row{display:flex;gap:0.5rem;}
.tbtn{flex:1;padding:0.7rem 0.3rem;border-radius:10px;border:2px solid #e0e0e0;background:#f5f5f5;color:#888888;font-family:'DM Mono',monospace;font-size:0.72rem;cursor:pointer;transition:all 0.14s;text-align:center;}
.tbtn.active{border-color:#2e7d32;color:#1b5e20;background:#e8f5e9;font-weight:700;}
.lumen-row{display:flex;gap:0.4rem;}
.lpill{flex:1;padding:0.6rem 0.2rem;border-radius:9px;border:2px solid #e0e0e0;background:#f5f5f5;color:#888888;font-family:'DM Mono',monospace;font-size:0.68rem;cursor:pointer;transition:all 0.14s;text-align:center;}
.lpill.active{border-color:#2e7d32;color:#1b5e20;background:#e8f5e9;font-weight:700;}
.lumen-hint{font-family:'DM Mono',monospace;font-size:0.6rem;color:#999999;margin-top:0.5rem;}

<script>
const state={dayType:'strength',lumenScore:3,hrv:58,rec:72,sleep:74,results:null};
window.addEventListener('DOMContentLoaded',()=>{
document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
loadSettings();updateConnStatus();
});
function showTab(name){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('screen-'+name).classList.add('active');const tabs={today:0,results:1,log:2,history:3,settings:4};document.querySelectorAll('.tab')[tabs[name]].classList.add('active');document.getElementById('content').scrollTop=0;}
function setDay(el){document.querySelectorAll('[data-day]').forEach(b=>b.classList.remove('active'));el.classList.add('active');state.dayType=el.dataset.day;}
function setLumen(el){document.querySelectorAll('[data-l]').forEach(b=>b.classList.remove('active'));el.classList.add('active');state.lumenScore=+el.dataset.l;}
function slider(id){const val=+document.getElementById(id).value;state[id]=val;const map={hrv:'hrv-val',rec:'rec-val',sleep:'sleep-val'};document.getElementById(map[id]).textContent=val;}
function calcMacros(){
const{dayType,lumenScore,hrv,rec,sleep}=state;
const isTraining=dayType!=='rest';
const readiness=(rec*0.55+(Math.min(hrv,120)/120)*100*0.30+sleep*0.15)/100;
let baseCals=dayType==='strength'?2020:dayType==='cardio'?1980:1760;
let targetCals=baseCals+Math.round((readiness-0.7)*267);
targetCals=Math.max(1600,Math.min(2150,targetCals));
const protein=Math.round(77.5*0.74*2.1);
const sleepCarb=sleep<70?30:25;
let periCarb=0,preCarb=0,postCarb=0;
if(isTraining){periCarb=dayType==='strength'?40:35;preCarb=Math.round(periCarb*0.45);postCarb=periCarb-preCarb;}
const remaining=targetCals-protein*4-sleepCarb*4-periCarb*4;
const lumenRatio=(lumenScore-1)/4;
let carbFrac=Math.min(0.65,0.28+lumenRatio*0.35+(isTraining?0.15:0));
const workingCarbs=Math.round(remaining*carbFrac/4);
const workingFat=Math.round(remaining*(1-carbFrac)/9);
const totalCarbs=workingCarbs+periCarb+sleepCarb;
const totalCals=Math.round(protein*4+totalCarbs*4+workingFat*9);
return{protein,carbs:totalCarbs,fat:workingFat,totalCals,sleepCarb,preCarb,postCarb,isTraining,readiness:Math.round(readiness*100),deficit:isTraining?'150-250':'350-500'};
}
function calculate(){
const r=calcMacros();state.results=r;
document.getElementById('cal-banner').className='cal-banner '+(r.isTraining?'tr':'rest');
document.getElementById('banner-type').textContent=state.dayType==='strength'?'STRENGTH DAY':state.dayType==='cardio'?'ZONE 2 DAY':'REST DAY';
document.getElementById('banner-kcal').textContent=r.totalCals;
const re=document.getElementById('banner-ready');re.textContent=r.readiness+'%';
re.style.color=r.readiness>=75?'#2e7d32':r.readiness>=55?'#f57f17':'#c62828';
document.getElementById('banner-deficit').textContent='~'+r.deficit+' kcal deficit';
document.getElementById('res-title').textContent=state.dayType==='strength'?'Strength Day':state.dayType==='cardio'?'Zone 2 Day':'Rest Day';
document.getElementById('r-protein').textContent=r.protein;
document.getElementById('r-carbs').textContent=r.carbs;
document.getElementById('r-fat').textContent=r.fat;
document.getElementById('sleep-note').innerHTML='Target <strong>'+r.sleepCarb+'g net carbs</strong> with dinner, 2-3 hours before bed. '+(state.sleep<70?'Sleep was disrupted - slightly increased to '+r.sleepCarb+'g tonight. ':'Sleep was good - hold at '+r.sleepCarb+'g. ')+'Best sources: half cup sweet potato (~13g net), half cup lentils (~15g net), small bowl oats (~20g net). Avoid exceeding ~35g net carbs at dinner.';
buildMeals(r);buildInsights(r);showTab('results');
}
function buildMeals(r){
const{protein:p,carbs:c,fat:f,sleepCarb,preCarb,postCarb,isTraining}=r;
const list=document.getElementById('meal-list');list.innerHTML='';
const meals=isTraining?[
{t:'Breakfast',d:'Eggs or Greek yogurt + oats',m:'P'+Math.round(p*.28)+' C'+Math.round(c*.18)+' F'+Math.round(f*.30)},
{t:'Pre-workout',d:'Banana or rice cake - '+preCarb+'g quick carbs',m:'P'+Math.round(p*.10)+' C'+preCarb+' F5'},
{t:'Post-workout',d:'Protein shake or chicken + rice - '+postCarb+'g fast carbs',m:'P'+Math.round(p*.25)+' C'+postCarb+' F'+Math.round(f*.10)},
{t:'Lunch',d:'Lean protein + salad + olive oil',m:'P'+Math.round(p*.22)+' C'+Math.round(c*.22)+' F'+Math.round(f*.35)},
{t:'Dinner',d:'Lean protein + vegetables + '+sleepCarb+'g net carbs',m:'P'+Math.round(p*.15)+' C'+sleepCarb+' F'+Math.round(f*.25)}
]:[
{t:'Breakfast',d:'Eggs or cottage cheese + greens',m:'P'+Math.round(p*.30)+' C'+Math.round(c*.15)+' F'+Math.round(f*.35)},
{t:'Lunch',d:'Tuna or chicken salad with avocado',m:'P'+Math.round(p*.32)+' C'+Math.round(c*.30)+' F'+Math.round(f*.35)},
{t:'Snack',d:'Greek yogurt or small handful of nuts',m:'P'+Math.round(p*.13)+' C'+Math.round(c*.20)+' F'+Math.round(f*.15)},
{t:'Dinner',d:'Lean protein + vegetables + '+sleepCarb+'g net carbs',m:'P'+Math.round(p*.25)+' C'+sleepCarb+' F'+Math.round(f*.15)}
];
meals.forEach(m=>{list.innerHTML+='<div class="meal-row"><div class="meal-time">'+m.t+'</div><div class="meal-desc">'+m.d+'</div><div class="meal-nums">'+m.m+'</div></div>';});
}
function buildInsights(r){
const list=document.getElementById('insights-list');list.innerHTML='';
const ins=[];
const{lumenScore,rec,hrv,sleep}=state;const{isTraining,readiness}=r;
if(lumenScore<=2&&isTraining)ins.push({i:'lightning',t:"Lumen shows fat-burn but you are training - peri-workout carbs take priority. Keep the rest of the day fat-focused."});
else if(lumenScore<=2)ins.push({i:'fire',t:'Lumen shows fat-burn on a rest day - ideal. Your body is using stored fat as fuel. Keep carbs only in the dinner window.'});
else if(lumenScore>=4)ins.push({i:'lightning',t:'Lumen shows carb-burn mode. Carbs bumped accordingly. Good day to train hard.'});
if(readiness<55)ins.push({i:'sleep',t:'Low readiness today (HRV '+hrv+'ms / Recovery '+rec+'%). Calories slightly reduced. Consider lighter training today.'});
else if(readiness>80)ins.push({i:'strong',t:'Strong readiness. Well-recovered - great day to push hard.'});
if(sleep<65)ins.push({i:'moon',t:'Sleep was below 65 last night. Stay close to your protein target today to protect muscle tissue.'});
ins.push({i:'chart',t:'Recomp goal: ~0.3-0.5 kg fat loss per week while maintaining lean mass. Expect visible changes over 10-16 weeks.'});
ins.forEach(function(x){list.innerHTML+='<div class="insight"><span class="insight-ico">'+x.i+'</span><span>'+x.t+'</span></div>';});
}
function updateNetCarbs(){
const total=+document.getElementById('l-acarb').value||0;
const fibre=+document.getElementById('l-afibre').value||0;
document.getElementById('l-netcarb').value=Math.max(0,total-fibre)||'';
}
function goLog(){
if(!state.results){calculate();return;}
const r=state.results;
document.getElementById('l-tprot').value=r.protein;
document.getElementById('l-tcarb').value=r.carbs;
document.getElementById('l-tfat').value=r.fat;
document.getElementById('l-tcal').value=r.totalCals;
showTab('log');
}
async function logToAirtable(){
const token=localStorage.getItem('at_token')||'';
const base=localStorage.getItem('at_base')||'';
const table=localStorage.getItem('at_table')||'Macros';
if(!token||!base){showStatus('log-status','err','Please add your Airtable token and Base ID in Settings first.');return;}
const btn=document.getElementById('log-btn');btn.textContent='Sending...';btn.disabled=true;
const r=state.results||{};
const fields={'Date':new Date().toISOString().split('T')[0],'Day Type':state.dayType.charAt(0).toUpperCase()+state.dayType.slice(1),'Lumen Score':state.lumenScore,'HRV':state.hrv,'Recovery Score':state.rec,'Sleep Score':state.sleep,'Target Protein':r.protein||0,'Target Carbs':r.carbs||0,'Target Fat':r.fat||0,'Target Calories':r.totalCals||0,'Actual Protein':+document.getElementById('l-aprot').value||0,'Actual Carbs':+document.getElementById('l-acarb').value||0,'Fibre':+document.getElementById('l-afibre').value||0,'Net Carbs':+document.getElementById('l-netcarb').value||0,'Actual Fat':+document.getElementById('l-afat').value||0,'Actual Calories':+document.getElementById('l-acal').value||0,'Notes':document.getElementById('l-notes').value||''};
const ns=document.getElementById('l-nextsleep').value;if(ns)fields['Next Sleep Score']=+ns;
try{
const res=await fetch('https://api.airtable.com/v0/'+base+'/'+encodeURIComponent(table),{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({fields:fields})});
const data=await res.json();
if(data.id){showStatus('log-status','ok','Logged successfully!');['l-aprot','l-acarb','l-afibre','l-netcarb','l-afat','l-acal','l-nextsleep','l-notes'].forEach(function(id){document.getElementById(id).value='';});}
else showStatus('log-status','err','Error: '+(data.error&&data.error.message||'Unknown error'));
}catch(e){showStatus('log-status','err','Network error: '+e.message);}
btn.textContent='Send to Airtable';btn.disabled=false;
}
async function fetchHistory(){
const token=localStorage.getItem('at_token')||'';
const base=localStorage.getItem('at_base')||'';
const table=localStorage.getItem('at_table')||'Macros';
if(!token||!base){showStatus('history-status','err','Configure Airtable in Settings first.');return;}
showStatus('history-status','ok','Fetching...');
try{
const res=await fetch('https://api.airtable.com/v0/'+base+'/'+encodeURIComponent(table)+'?sort[0][field]=Date&sort[0][direction]=desc&maxRecords=10',{headers:{'Authorization':'Bearer '+token}});
const data=await res.json();
if(!data.records){showStatus('history-status','err','Error: '+(data.error&&data.error.message||'Failed'));return;}
showStatus('history-status','ok',data.records.length+' records loaded');
const list=document.getElementById('history-list');list.innerHTML='';
data.records.forEach(function(rec){
const f=rec.fields;
const delta=(f['Actual Calories']&&f['Target Calories'])?f['Actual Calories']-f['Target Calories']:null;
list.innerHTML+='<div class="card" style="margin-top:0.6rem;"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.7rem;"><span style="font-weight:800;font-size:1rem;">'+(f['Date']||'--')+'</span><span style="font-family:DM Mono,monospace;font-size:0.65rem;color:#888;">'+(f['Day Type']||'')+'</span></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;font-family:DM Mono,monospace;font-size:0.65rem;"><div><div style="color:#f57f17;font-weight:700;">P '+(f['Actual Protein']||'--')+'g</div><div style="color:#999">tgt '+(f['Target Protein']||'--')+'</div></div><div><div style="color:#2e7d32;font-weight:700;">C '+(f['Net Carbs']||f['Actual Carbs']||'--')+'g net</div><div style="color:#999">tgt '+(f['Target Carbs']||'--')+'</div></div><div><div style="color:#e65100;font-weight:700;">F '+(f['Actual Fat']||'--')+'g</div><div style="color:#999">tgt '+(f['Target Fat']||'--')+'</div></div><div><div style="color:'+(delta===null?'#888':delta>100?'#c62828':'#2e7d32')+';font-weight:700;">'+(f['Actual Calories']||'--')+' kcal</div><div style="color:#999">'+(delta!==null?(delta>0?'+':'')+delta:'')+'</div></div></div>'+(f['Next Sleep Score']?'<div style="margin-top:0.6rem;font-family:DM Mono,monospace;font-size:0.65rem;color:#1565c0;">Sleep next: '+f['Next Sleep Score']+'</div>':'')+(f['Notes']?'<div style="margin-top:0.4rem;font-size:0.78rem;color:#555;">'+f['Notes']+'</div>':'')+'</div>';
});
}catch(e){showStatus('history-status','err','Network error: '+e.message);}
}
function saveSettings(){localStorage.setItem('at_token',document.getElementById('s-token').value);localStorage.setItem('at_base',document.getElementById('s-base').value);localStorage.setItem('at_table',document.getElementById('s-table').value||'Macros');updateConnStatus();}
function loadSettings(){document.getElementById('s-token').value=localStorage.getItem('at_token')||'';document.getElementById('s-base').value=localStorage.getItem('at_base')||'';document.getElementById('s-table').value=localStorage.getItem('at_table')||'Macros';}
function updateConnStatus(){
const el=document.getElementById('conn-status');
const token=localStorage.getItem('at_token')||'';
const base=localStorage.getItem('at_base')||'';
if(token&&base){el.innerHTML='<span class="dot ok"></span>Configured - ready to log';el.style.color='#2e7d32';}
else if(token||base){el.innerHTML='<span class="dot warn"></span>Partially configured';el.style.color='#f57f17';}
else{el.innerHTML='<span class="dot warn"></span>Not configured';el.style.color='#999999';}
}
function showStatus(id,type,msg){const el=document.getElementById(id);el.className='status '+type+' show';el.textContent=msg;if(type==='ok')setTimeout(function(){el.classList.remove('show');},4000);}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
